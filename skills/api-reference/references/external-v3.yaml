        integration_id:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/IntegrationId'
        domain:
          $ref: '#/components/schemas/Domain'
        name:
          $ref: '#/components/schemas/schemas-Name'
        created_at:
          readOnly: true
