        targets:
          age_ranges:
            - min: 23
              max: 27
            - min: 32
              max: 45
          artist_ids:
            - 06HL4z0CvFAxyc27GXpf02
          geo_targets:
            country_code: US
            dma_ids:
              - '501'
            region_ids:
              - '5279468'
            city_ids:
              - '4174700'
            postal_code_ids:
              - US:73170
          genders:
            - MALE
